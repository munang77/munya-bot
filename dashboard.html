<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>무냐 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080810;
  --bg2: #0e0e1a;
  --card: #141422;
  --border: rgba(255,255,255,0.07);
  --accent: #7c6df0;
  --accent2: #a78bfa;
  --green: #34d399;
  --red: #f87171;
  --text: #f1f0ff;
  --sub: #9998b8;
  --muted: #6b6a8a;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* ── 로딩 ── */
#loading {
  position:fixed; inset:0; background:var(--bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
  z-index:1000;
}
.spinner {
  width:40px; height:40px;
  border:3px solid var(--border);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ── 네비 ── */
nav {
  position:fixed; top:0; left:0; right:0; z-index:100;
  display:flex; justify-content:space-between; align-items:center;
  padding:16px 40px;
  background:rgba(8,8,16,0.85);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.nav-logo { display:flex; align-items:center; gap:10px; font-weight:700; font-size:1.1rem; text-decoration:none; color:var(--text); }
.logo-dot { width:8px; height:8px; border-radius:50%; background:var(--green); box-shadow:0 0 10px var(--green); animation:blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.nav-right { display:flex; align-items:center; gap:16px; }
.user-info { display:flex; align-items:center; gap:10px; }
.user-avatar { width:32px; height:32px; border-radius:50%; }
.user-name { font-size:0.9rem; font-weight:600; }
.btn-logout {
  padding:8px 18px; background:transparent;
  border:1px solid var(--border); border-radius:8px;
  color:var(--sub); font-size:0.85rem; cursor:pointer;
  font-family:inherit; transition:all .2s;
}
.btn-logout:hover { border-color:var(--red); color:var(--red); }

/* ── 메인 레이아웃 ── */
.layout { display:flex; min-height:100vh; padding-top:65px; }

/* ── 사이드바 ── */
.sidebar {
  width:260px; flex-shrink:0;
  background:var(--bg2);
  border-right:1px solid var(--border);
  padding:24px 16px;
  position:fixed; top:65px; bottom:0; left:0;
  overflow-y:auto;
}
.sidebar-title { font-size:0.75rem; font-weight:700; color:var(--muted); letter-spacing:1px; text-transform:uppercase; padding:0 8px; margin-bottom:12px; }
.server-item {
  display:flex; align-items:center; gap:12px;
  padding:10px 12px; border-radius:10px;
  cursor:pointer; transition:all .2s;
  border:1px solid transparent;
  margin-bottom:4px;
}
.server-item:hover { background:var(--card); }
.server-item.active { background:rgba(124,109,240,0.1); border-color:rgba(124,109,240,0.3); }
.server-icon {
  width:40px; height:40px; border-radius:12px;
  object-fit:cover; background:var(--card);
  display:flex; align-items:center; justify-content:center;
  font-size:1.2rem; flex-shrink:0; font-weight:700;
  color:var(--accent2);
}
.server-icon img { width:100%; height:100%; border-radius:12px; object-fit:cover; }
.server-name { font-size:0.9rem; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* ── 컨텐츠 ── */
.content { margin-left:0; flex:1; padding:32px 40px; max-width:1000px; }

/* ── 페이지들 ── */
.page { display:none; }
.page.active { display:block; }

/* 로그인 페이지 */
#login-page {
  min-height:calc(100vh - 65px);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  text-align:center; padding:40px;
}
.login-card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  padding:48px 40px;
  max-width:420px; width:100%;
}
.login-icon { font-size:3rem; margin-bottom:16px; }
.login-card h2 { font-size:1.5rem; font-weight:700; margin-bottom:8px; }
.login-card p { color:var(--sub); margin-bottom:32px; font-size:0.95rem; }
.btn-discord {
  display:flex; align-items:center; justify-content:center; gap:12px;
  width:100%; padding:16px;
  background:#5865f2; color:#fff;
  border:none; border-radius:12px;
  font-family:inherit; font-size:1rem; font-weight:700;
  cursor:pointer; transition:all .25s;
  text-decoration:none;
}
.btn-discord:hover { background:#4752c4; transform:translateY(-2px); box-shadow:0 8px 24px rgba(88,101,242,0.4); }

/* 서버 선택 안내 */
#select-page {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  min-height:60vh; text-align:center; color:var(--muted);
}
#select-page .big-icon { font-size:3rem; margin-bottom:16px; }

/* 서버 대시보드 */
.server-header {
  display:flex; align-items:center; gap:16px;
  margin-bottom:32px;
}
.server-header-icon {
  width:56px; height:56px; border-radius:14px;
  background:var(--card); display:flex; align-items:center; justify-content:center;
  font-size:1.5rem; font-weight:700; color:var(--accent2);
  flex-shrink:0;
}
.server-header-icon img { width:100%; height:100%; border-radius:14px; object-fit:cover; }
.server-header h2 { font-size:1.5rem; font-weight:700; }
.server-header p { color:var(--sub); font-size:0.9rem; }

/* 설정 카드 */
.settings-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }
.settings-card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:24px;
}
.settings-card.full { grid-column:1/-1; }
.card-title {
  display:flex; align-items:center; gap:10px;
  font-size:1rem; font-weight:700;
  margin-bottom:20px;
  padding-bottom:12px;
  border-bottom:1px solid var(--border);
}
.card-icon { font-size:1.2rem; }

/* 토글 */
.toggle-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.04);
}
.toggle-row:last-child { border-bottom:none; }
.toggle-label { font-size:0.9rem; color:var(--sub); }
.toggle {
  position:relative; width:44px; height:24px;
  cursor:pointer;
}
.toggle input { opacity:0; width:0; height:0; }
.toggle-slider {
  position:absolute; inset:0;
  background:var(--border);
  border-radius:100px;
  transition:.3s;
}
.toggle-slider::before {
  content:'';
  position:absolute;
  width:18px; height:18px;
  left:3px; bottom:3px;
  background:#fff; border-radius:50%;
  transition:.3s;
}
.toggle input:checked + .toggle-slider { background:var(--accent); }
.toggle input:checked + .toggle-slider::before { transform:translateX(20px); }

/* 입력 */
.input-group { margin-bottom:14px; }
.input-label { font-size:0.8rem; color:var(--muted); font-weight:600; margin-bottom:6px; display:block; letter-spacing:0.5px; text-transform:uppercase; }
.input-field, .select-field {
  width:100%; padding:10px 14px;
  background:var(--bg); color:var(--text);
  border:1px solid var(--border); border-radius:8px;
  font-family:inherit; font-size:0.9rem;
  transition:border-color .2s;
  outline:none;
}
.input-field:focus, .select-field:focus { border-color:var(--accent); }
.select-field option { background:var(--bg2); }

/* 금지어 태그 */
.tag-list { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; }
.tag {
  display:flex; align-items:center; gap:6px;
  padding:4px 12px;
  background:rgba(248,113,113,0.1);
  border:1px solid rgba(248,113,113,0.2);
  border-radius:100px; font-size:0.82rem; color:var(--red);
}
.tag button {
  background:none; border:none; color:var(--red);
  cursor:pointer; font-size:0.85rem; padding:0; line-height:1;
}
.tag-input-row { display:flex; gap:8px; }
.tag-input-row .input-field { flex:1; }
.btn-add {
  padding:10px 16px; background:var(--accent);
  color:#fff; border:none; border-radius:8px;
  font-family:inherit; font-size:0.88rem; font-weight:600;
  cursor:pointer; transition:all .2s; white-space:nowrap;
}
.btn-add:hover { background:var(--accent2); }

/* 저장 버튼 */
.save-bar {
  position:sticky; bottom:0;
  background:linear-gradient(to top, var(--bg) 60%, transparent);
  padding:20px 0 24px;
  display:flex; justify-content:flex-end; gap:12px;
}
.btn-save {
  padding:12px 32px; background:var(--accent);
  color:#fff; border:none; border-radius:10px;
  font-family:inherit; font-size:0.95rem; font-weight:700;
  cursor:pointer; transition:all .25s;
  box-shadow:0 4px 16px rgba(124,109,240,0.3);
}
.btn-save:hover { background:var(--accent2); transform:translateY(-2px); }
.btn-save:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
.btn-save.saved { background:var(--green); }

/* 토스트 */
.toast {
  position:fixed; bottom:32px; right:32px;
  padding:14px 24px;
  background:var(--card); border:1px solid var(--border);
  border-radius:12px; font-size:0.9rem;
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
  transform:translateY(80px); opacity:0;
  transition:all .3s; z-index:999;
}
.toast.show { transform:translateY(0); opacity:1; }
.toast.success { border-color:rgba(52,211,153,0.3); color:var(--green); }
.toast.error { border-color:rgba(248,113,113,0.3); color:var(--red); }

@media (max-width:768px) {
  .sidebar { display:none; }
  .content { margin-left:0; padding:20px; }
  .settings-grid { grid-template-columns:1fr; }
  nav { padding:14px 20px; }
}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <span style="color:var(--sub);font-size:0.9rem;">로딩 중...</span>
</div>

<nav>
  <a href="index.html" class="nav-logo">
    <span class="logo-dot"></span>
    무냐 대시보드
  </a>
  <div class="nav-right" id="nav-user" style="display:none">
    <div class="user-info">
      <img class="user-avatar" id="nav-avatar" src="" alt="">
      <span class="user-name" id="nav-name"></span>
    </div>
    <button class="btn-logout" onclick="logout()">로그아웃</button>
  </div>
</nav>

<div class="layout">
  <!-- 사이드바 -->
  <aside class="sidebar" id="sidebar" style="display:none">
    <div class="sidebar-title">내 서버</div>
    <div id="server-list"></div>
  </aside>

  <!-- 컨텐츠 -->
  <main class="content" id="main-content">

    <!-- 로그인 페이지 -->
    <div id="login-page" class="page active">
      <div class="login-card">
        <div class="login-icon">🤖</div>
        <h2>무냐 대시보드</h2>
        <p>서버 설정을 관리하려면<br>디스코드로 로그인해주세요.</p>
        <a href="#" class="btn-discord" id="login-btn" onclick="login()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.001.022.01.043.027.056a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
          디스코드로 로그인
        </a>
      </div>
    </div>

    <!-- 서버 선택 안내 -->
    <div id="select-page" class="page">
      <div class="big-icon">👈</div>
      <h3 style="font-size:1.2rem;margin-bottom:8px;">서버를 선택해주세요</h3>
      <p style="font-size:0.9rem;">왼쪽에서 설정할 서버를 골라요</p>
    </div>

    <!-- 서버 설정 페이지 -->
    <div id="guild-page" class="page">
      <div class="server-header">
        <div class="server-header-icon" id="guild-icon-wrap">
          <img id="guild-icon" src="" alt="" style="display:none">
          <span id="guild-icon-text"></span>
        </div>
        <div>
          <h2 id="guild-name"></h2>
          <p id="guild-member-count"></p>
        </div>
      </div>

      <div class="settings-grid">
        <!-- 보안 설정 -->
        <div class="settings-card">
          <div class="card-title"><span class="card-icon">🛡️</span>보안 설정</div>
          <div class="toggle-row">
            <span class="toggle-label">도배 감지</span>
            <label class="toggle"><input type="checkbox" id="sec-spam"><span class="toggle-slider"></span></label>
          </div>
          <div class="toggle-row">
            <span class="toggle-label">초대링크 감지</span>
            <label class="toggle"><input type="checkbox" id="sec-invite"><span class="toggle-slider"></span></label>
          </div>
          <div class="toggle-row">
            <span class="toggle-label">전체멘션 감지</span>
            <label class="toggle"><input type="checkbox" id="sec-mention"><span class="toggle-slider"></span></label>
          </div>
          <div class="toggle-row">
            <span class="toggle-label">금지어 필터</span>
            <label class="toggle"><input type="checkbox" id="sec-badword"><span class="toggle-slider"></span></label>
          </div>
          <div style="margin-top:16px">
            <div class="input-group">
              <label class="input-label">경고 한도</label>
              <input type="number" class="input-field" id="sec-warn-limit" min="1" max="20">
            </div>
            <div class="input-group">
              <label class="input-label">타임아웃 시간 (분)</label>
              <input type="number" class="input-field" id="sec-timeout" min="1">
            </div>
          </div>
        </div>

        <!-- 무냐야 응답 + 채널 설정 -->
        <div class="settings-card">
          <div class="card-title"><span class="card-icon">💬</span>무냐야 응답</div>
          <div class="toggle-row">
            <span class="toggle-label">무냐야 응답 활성화</span>
            <label class="toggle"><input type="checkbox" id="chat-enabled"><span class="toggle-slider"></span></label>
          </div>
          <div style="margin-top:20px">
            <div class="card-title" style="margin-top:0"><span class="card-icon">📢</span>채널 설정</div>
            <div class="input-group">
              <label class="input-label">환영 채널</label>
              <select class="select-field" id="ch-welcome">
                <option value="">없음</option>
              </select>
            </div>
            <div class="input-group">
              <label class="input-label">로그 채널</label>
              <select class="select-field" id="ch-log">
                <option value="">없음</option>
              </select>
            </div>
            <div class="input-group">
              <label class="input-label">전달 채널</label>
              <select class="select-field" id="ch-notify">
                <option value="">없음</option>
              </select>
            </div>
          </div>
        </div>

        <!-- 티켓 설정 -->
        <div class="settings-card">
          <div class="card-title"><span class="card-icon">🎫</span>티켓 설정</div>
          <div class="input-group">
            <label class="input-label">티켓 카테고리</label>
            <select class="select-field" id="ticket-category">
              <option value="">없음</option>
            </select>
          </div>
          <div class="input-group">
            <label class="input-label">지원팀 역할</label>
            <select class="select-field" id="ticket-role">
              <option value="">없음</option>
            </select>
          </div>
          <div class="input-group">
            <label class="input-label">티켓 로그 채널</label>
            <select class="select-field" id="ticket-log">
              <option value="">없음</option>
            </select>
          </div>
        </div>

        <!-- 금지어 -->
        <div class="settings-card">
          <div class="card-title"><span class="card-icon">🚫</span>금지어 목록</div>
          <div class="tag-list" id="badwords-list"></div>
          <div class="tag-input-row">
            <input type="text" class="input-field" id="badword-input" placeholder="금지어 입력" onkeypress="if(event.key==='Enter')addBadword()">
            <button class="btn-add" onclick="addBadword()">추가</button>
          </div>
        </div>
      </div>

      <div class="save-bar">
        <button class="btn-save" id="save-btn" onclick="saveSettings()">설정 저장</button>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
const API = window.location.hostname === 'localhost'
  ? 'http://localhost:8080'
  : 'https://discord-bot-production-463c.up.railway.app';

let currentGuildId = null;
let currentGuildData = null;

// ── 초기화 ──
async function init() {
  // URL 파라미터 체크 (OAuth 에러)
  const params = new URLSearchParams(location.search);
  if (params.get("error")) {
    showToast("로그인 실패: " + params.get("error"), "error");
    history.replaceState({}, "", location.pathname);
  }

  try {
    const res = await fetch(`${API}/api/me`, { credentials: "include" });
    if (!res.ok) throw new Error("Not logged in");
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    showDashboard(data);
  } catch {
    showPage("login-page");
  } finally {
    document.getElementById("loading").style.display = "none";
  }
}

function showPage(id) {
  document.querySelectorAll(".page").forEach(p => {
    p.style.display = "none";
    p.classList.remove("active");
  });
  const el = document.getElementById(id);
  el.style.display = id === "login-page" ? "flex" : "block";
  el.classList.add("active");
}

function showDashboard(data) {
  // 네비 유저 표시
  const user = data.user;
  const avatarUrl = user.avatar
    ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`
    : `https://cdn.discordapp.com/embed/avatars/0.png`;
  document.getElementById("nav-avatar").src = avatarUrl;
  document.getElementById("nav-name").textContent = user.username;
  document.getElementById("nav-user").style.display = "flex";
  document.getElementById("sidebar").style.display = "block";
  document.getElementById("main-content").style.marginLeft = "260px";

  // 서버 목록
  const list = document.getElementById("server-list");
  list.innerHTML = "";
  if (data.guilds.length === 0) {
    list.innerHTML = `<p style="color:var(--muted);font-size:0.85rem;padding:8px">봇이 있는 서버가 없어요</p>`;
  }
  data.guilds.forEach(g => {
    const el = document.createElement("div");
    el.className = "server-item";
    el.dataset.id = g.id;
    const iconHtml = g.icon
      ? `<div class="server-icon"><img src="https://cdn.discordapp.com/icons/${g.id}/${g.icon}.png" alt="" onerror="this.parentElement.textContent='${g.name[0]}'"></div>`
      : `<div class="server-icon">${g.name[0]}</div>`;
    el.innerHTML = `${iconHtml}<span class="server-name">${g.name}</span>`;
    el.onclick = () => selectGuild(g.id, el);
    list.appendChild(el);
  });

  showPage("select-page");
}

async function selectGuild(guildId, el) {
  document.querySelectorAll(".server-item").forEach(i => i.classList.remove("active"));
  el.classList.add("active");
  currentGuildId = guildId;

  try {
    const res = await fetch(`${API}/api/guild/${guildId}`, { credentials: "include" });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    currentGuildData = data;
    renderGuild(data);
    showPage("guild-page");
  } catch(e) {
    showToast("서버 정보 로드 실패: " + e.message, "error");
  }
}

function renderGuild(data) {
  // 헤더
  document.getElementById("guild-name").textContent = data.name;
  document.getElementById("guild-member-count").textContent = `멤버 ${data.member_count}명`;
  const iconImg = document.getElementById("guild-icon");
  const iconText = document.getElementById("guild-icon-text");
  if (data.icon) {
    iconImg.src = data.icon;
    iconImg.style.display = "block";
    iconText.style.display = "none";
  } else {
    iconImg.style.display = "none";
    iconText.style.display = "block";
    iconText.textContent = data.name[0];
  }

  // 보안
  document.getElementById("sec-spam").checked = data.security.spam;
  document.getElementById("sec-invite").checked = data.security.invite;
  document.getElementById("sec-mention").checked = data.security.mention;
  document.getElementById("sec-badword").checked = data.security.badword;
  document.getElementById("sec-warn-limit").value = data.security.warn_limit;
  document.getElementById("sec-timeout").value = data.security.timeout_minutes;

  // 채팅
  document.getElementById("chat-enabled").checked = data.chat_enabled;

  // 채널 셀렉트 채우기
  const chOptions = `<option value="">없음</option>` + data.text_channels.map(c => `<option value="${c.id}">${c.name}</option>`).join("");
  ["ch-welcome", "ch-log", "ch-notify", "ticket-log"].forEach(id => {
    document.getElementById(id).innerHTML = chOptions;
  });
  document.getElementById("ch-welcome").value = data.channels.welcome || "";
  document.getElementById("ch-log").value = data.channels.log || "";
  document.getElementById("ch-notify").value = data.channels.notify || "";
  document.getElementById("ticket-log").value = data.ticket.log_channel_id || "";

  // 카테고리
  const catOptions = `<option value="">없음</option>` + data.categories.map(c => `<option value="${c.id}">${c.name}</option>`).join("");
  document.getElementById("ticket-category").innerHTML = catOptions;
  document.getElementById("ticket-category").value = data.ticket.category_id || "";

  // 역할
  const roleOptions = `<option value="">없음</option>` + data.roles.map(r => `<option value="${r.id}">${r.name}</option>`).join("");
  document.getElementById("ticket-role").innerHTML = roleOptions;
  document.getElementById("ticket-role").value = data.ticket.support_role_id || "";

  // 금지어
  renderBadwords(data.security.badwords || []);
}

function renderBadwords(words) {
  const list = document.getElementById("badwords-list");
  list.innerHTML = "";
  words.forEach((w, i) => {
    const tag = document.createElement("div");
    tag.className = "tag";
    tag.innerHTML = `${w}<button onclick="removeBadword(${i})">×</button>`;
    list.appendChild(tag);
  });
}

function addBadword() {
  const input = document.getElementById("badword-input");
  const word = input.value.trim();
  if (!word) return;
  if (!currentGuildData.security.badwords.includes(word)) {
    currentGuildData.security.badwords.push(word);
    renderBadwords(currentGuildData.security.badwords);
  }
  input.value = "";
}

function removeBadword(index) {
  currentGuildData.security.badwords.splice(index, 1);
  renderBadwords(currentGuildData.security.badwords);
}

async function saveSettings() {
  const btn = document.getElementById("save-btn");
  btn.disabled = true;
  btn.textContent = "저장 중...";
  try {
    const payload = {
      security: {
        spam: document.getElementById("sec-spam").checked,
        invite: document.getElementById("sec-invite").checked,
        mention: document.getElementById("sec-mention").checked,
        badword: document.getElementById("sec-badword").checked,
        warn_limit: parseInt(document.getElementById("sec-warn-limit").value),
        timeout_minutes: parseInt(document.getElementById("sec-timeout").value),
        badwords: currentGuildData.security.badwords,
      },
      ticket: {
        category_id: document.getElementById("ticket-category").value,
        support_role_id: document.getElementById("ticket-role").value,
        log_channel_id: document.getElementById("ticket-log").value,
      },
      channels: {
        welcome: document.getElementById("ch-welcome").value,
        log: document.getElementById("ch-log").value,
        notify: document.getElementById("ch-notify").value,
      },
      chat_enabled: document.getElementById("chat-enabled").checked,
    };
    const res = await fetch(`${API}/api/guild/${currentGuildId}`, {
      method: "POST",
      credentials: "include",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (data.success) {
      btn.textContent = "저장됨 ✓";
      btn.classList.add("saved");
      showToast("설정이 저장됐어요!", "success");
      setTimeout(() => {
        btn.textContent = "설정 저장";
        btn.classList.remove("saved");
        btn.disabled = false;
      }, 2000);
    } else {
      throw new Error(data.error || "저장 실패");
    }
  } catch(e) {
    showToast("저장 실패: " + e.message, "error");
    btn.textContent = "설정 저장";
    btn.disabled = false;
  }
}

function login() {
  window.location.href = `${API}/auth/login`;
}

async function logout() {
  await fetch(`${API}/api/logout`, { method: "POST", credentials: "include" });
  location.reload();
}

function showToast(msg, type = "success") {
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.className = `toast ${type} show`;
  setTimeout(() => toast.classList.remove("show"), 3000);
}

init();
</script>
