<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>무냐 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07070f;
  --bg2: #0d0d1a;
  --bg3: #111120;
  --card: #13131f;
  --card2: #181828;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.1);
  --accent: #7c6df0;
  --accent2: #a78bfa;
  --accent3: #c4b5fd;
  --green: #34d399;
  --red: #f87171;
  --yellow: #fbbf24;
  --text: #f0efff;
  --sub: #8887a8;
  --muted: #55547a;
  --sidebar-w: 240px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* ── 로딩 ── */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:9999;}
.spin{width:36px;height:36px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── 네비 ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  height:56px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;
  background:rgba(7,7,15,0.9);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
}
.nav-logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:1rem;text-decoration:none;color:var(--text);letter-spacing:-0.3px;}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(.8);}}
.nav-right{display:flex;align-items:center;gap:12px;}
.user-chip{display:flex;align-items:center;gap:8px;padding:5px 12px 5px 5px;background:var(--card2);border:1px solid var(--border2);border-radius:100px;}
.user-avatar{width:26px;height:26px;border-radius:50%;object-fit:cover;}
.user-name{font-size:.82rem;font-weight:600;color:var(--text);}
.btn-logout{padding:6px 14px;background:transparent;border:1px solid var(--border2);border-radius:8px;color:var(--sub);font-size:.8rem;cursor:pointer;font-family:inherit;transition:all .2s;}
.btn-logout:hover{border-color:var(--red);color:var(--red);}

/* ── 앱 레이아웃 ── */
.app{display:flex;min-height:100vh;padding-top:56px;}

/* ── 사이드바 ── */
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:var(--bg2);
  border-right:1px solid var(--border);
  padding:20px 12px;
  position:fixed;top:56px;bottom:0;left:0;
  overflow-y:auto;
  display:none;
}
.sidebar::-webkit-scrollbar{width:4px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
.sidebar-label{font-size:.7rem;font-weight:700;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;padding:0 8px;margin-bottom:10px;}
.server-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 10px;border-radius:10px;
  cursor:pointer;transition:all .18s;
  border:1px solid transparent;margin-bottom:3px;
}
.server-item:hover{background:var(--card);}
.server-item.active{background:rgba(124,109,240,.12);border-color:rgba(124,109,240,.3);}
.srv-icon{
  width:36px;height:36px;border-radius:10px;flex-shrink:0;
  background:var(--card2);display:flex;align-items:center;justify-content:center;
  font-size:1rem;font-weight:800;color:var(--accent2);overflow:hidden;
}
.srv-icon img{width:100%;height:100%;object-fit:cover;border-radius:10px;}
.srv-name{font-size:.85rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ── 컨텐츠 ── */
.content{
  flex:1;
  margin-left:0;
  padding:28px 32px;
  min-width:0;
}
.content.shifted{margin-left:var(--sidebar-w);}

/* ── 페이지 ── */
.page{display:none;}
.page.active{display:block;}

/* ── 로그인 ── */
#login-page{
  min-height:calc(100vh - 56px);
  display:flex;align-items:center;justify-content:center;
}
.login-card{
  background:var(--card);
  border:1px solid var(--border2);
  border-radius:20px;
  padding:44px 40px;
  max-width:400px;width:100%;
  text-align:center;
}
.login-icon{font-size:2.8rem;margin-bottom:14px;}
.login-card h2{font-size:1.4rem;font-weight:800;margin-bottom:8px;}
.login-card p{color:var(--sub);font-size:.9rem;line-height:1.6;margin-bottom:28px;}
.btn-discord{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:14px;
  background:#5865f2;color:#fff;
  border:none;border-radius:12px;
  font-family:inherit;font-size:.95rem;font-weight:700;
  cursor:pointer;transition:all .25s;text-decoration:none;
}
.btn-discord:hover{background:#4752c4;transform:translateY(-2px);box-shadow:0 8px 20px rgba(88,101,242,.4);}

/* ── 서버선택 안내 ── */
#select-page{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:70vh;text-align:center;
}

/* ── 서버 헤더 ── */
.guild-header{
  display:flex;align-items:center;gap:16px;
  margin-bottom:28px;
  padding:20px 24px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
}
.guild-avatar{
  width:52px;height:52px;border-radius:14px;flex-shrink:0;
  background:var(--card2);display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;font-weight:800;color:var(--accent2);overflow:hidden;
}
.guild-avatar img{width:100%;height:100%;object-fit:cover;border-radius:14px;}
.guild-info h2{font-size:1.2rem;font-weight:800;}
.guild-info p{color:var(--sub);font-size:.83rem;margin-top:2px;}
.guild-stats{margin-left:auto;display:flex;gap:16px;}
.gstat{text-align:center;}
.gstat-num{font-size:1.1rem;font-weight:800;color:var(--accent2);}
.gstat-label{font-size:.72rem;color:var(--muted);}

/* ── 탭 ── */
.tabs{display:flex;gap:4px;margin-bottom:24px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:5px;}
.tab{
  padding:8px 18px;border-radius:8px;font-size:.85rem;font-weight:600;
  cursor:pointer;transition:all .18s;color:var(--sub);border:none;background:none;
  font-family:inherit;white-space:nowrap;
}
.tab.active{background:var(--accent);color:#fff;box-shadow:0 2px 10px rgba(124,109,240,.35);}
.tab:hover:not(.active){color:var(--text);background:var(--card2);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

/* ── 그리드 ── */
.grid{display:grid;gap:16px;}
.grid-2{grid-template-columns:repeat(2,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-auto{grid-template-columns:repeat(auto-fill,minmax(320px,1fr));}
.col-span-2{grid-column:span 2;}
.col-span-3{grid-column:1/-1;}

/* ── 카드 ── */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;padding:22px;
}
.card-head{
  display:flex;align-items:center;gap:9px;
  font-size:.9rem;font-weight:700;
  margin-bottom:18px;padding-bottom:14px;
  border-bottom:1px solid var(--border);
}
.card-icon{font-size:1.1rem;}

/* ── 토글 ── */
.toggle-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04);
}
.toggle-row:last-child{border-bottom:none;}
.toggle-label{font-size:.87rem;color:var(--sub);}
.sw{position:relative;width:42px;height:23px;cursor:pointer;}
.sw input{opacity:0;width:0;height:0;}
.sw-track{
  position:absolute;inset:0;background:var(--border2);
  border-radius:100px;transition:.25s;
}
.sw-track::before{
  content:'';position:absolute;
  width:17px;height:17px;left:3px;bottom:3px;
  background:#fff;border-radius:50%;transition:.25s;
}
.sw input:checked+.sw-track{background:var(--accent);}
.sw input:checked+.sw-track::before{transform:translateX(19px);}

/* ── 인풋 ── */
.field{margin-bottom:13px;}
.field label{display:block;font-size:.73rem;font-weight:700;color:var(--muted);letter-spacing:.6px;text-transform:uppercase;margin-bottom:6px;}
.inp,.sel{
  width:100%;padding:9px 12px;
  background:var(--bg);color:var(--text);
  border:1px solid var(--border2);border-radius:8px;
  font-family:inherit;font-size:.87rem;
  transition:border-color .2s;outline:none;
}
.inp:focus,.sel:focus{border-color:var(--accent);}
.sel option{background:var(--bg2);}

/* ── 태그 ── */
.tag-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;min-height:28px;}
.tag{
  display:flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:100px;font-size:.78rem;
  background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.2);color:var(--red);
}
.tag button{background:none;border:none;color:var(--red);cursor:pointer;font-size:.82rem;line-height:1;padding:0;}
.row{display:flex;gap:8px;}
.row .inp{flex:1;}

/* ── 버튼들 ── */
.btn{
  padding:9px 16px;border:none;border-radius:8px;
  font-family:inherit;font-size:.83rem;font-weight:700;
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent2);}
.btn-danger{background:rgba(248,113,113,.15);color:var(--red);border:1px solid rgba(248,113,113,.25);}
.btn-danger:hover{background:rgba(248,113,113,.25);}
.btn-full{width:100%;margin-top:6px;}

/* ── 리스트 아이템 ── */
.list-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 0;border-bottom:1px solid var(--border);font-size:.85rem;
}
.list-item:last-child{border-bottom:none;}
.list-item-left{color:var(--sub);}
.list-item-right{font-weight:700;}

/* ── 저장바 ── */
.save-bar{
  position:sticky;bottom:0;
  background:linear-gradient(to top,var(--bg) 55%,transparent);
  padding:20px 0 24px;
  display:flex;justify-content:flex-end;gap:10px;
  margin-top:20px;
}
.btn-save{
  padding:11px 30px;background:var(--accent);
  color:#fff;border:none;border-radius:10px;
  font-family:inherit;font-size:.9rem;font-weight:700;
  cursor:pointer;transition:all .25s;
  box-shadow:0 4px 14px rgba(124,109,240,.3);
}
.btn-save:hover{background:var(--accent2);transform:translateY(-2px);}
.btn-save:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.btn-save.saved{background:var(--green);}

/* ── 토스트 ── */
.toast{
  position:fixed;bottom:28px;right:28px;
  padding:12px 22px;background:var(--card2);border:1px solid var(--border2);
  border-radius:12px;font-size:.87rem;
  transform:translateY(80px);opacity:0;transition:all .3s;z-index:999;
  box-shadow:0 8px 28px rgba(0,0,0,.4);
}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{border-color:rgba(52,211,153,.3);color:var(--green);}
.toast.error{border-color:rgba(248,113,113,.3);color:var(--red);}

/* ── 반응형 ── */
@media(max-width:900px){
  .grid-3{grid-template-columns:repeat(2,1fr);}
  .col-span-2{grid-column:1/-1;}
}
@media(max-width:640px){
  .sidebar{display:none!important;}
  .content.shifted{margin-left:0;}
  .grid-2,.grid-3,.grid-auto{grid-template-columns:1fr;}
  .col-span-2,.col-span-3{grid-column:1/-1;}
  nav{padding:0 16px;}
  .content{padding:16px;}
  .tabs{overflow-x:auto;}
  .guild-stats{display:none;}
}
</style>
</head>
<body>

<div id="loading">
  <div class="spin"></div>
  <span style="color:var(--sub);font-size:.85rem;">로딩 중...</span>
</div>

<nav>
  <a href="index.html" class="nav-logo">
    <span class="logo-dot"></span>
    무냐 대시보드
  </a>
  <div class="nav-right" id="nav-user" style="display:none">
    <div class="user-chip">
      <img class="user-avatar" id="nav-avatar" src="" alt="">
      <span class="user-name" id="nav-name"></span>
    </div>
    <button class="btn-logout" onclick="logout()">로그아웃</button>
  </div>
</nav>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-label">내 서버</div>
    <div id="server-list"></div>
  </aside>

  <main class="content" id="main-content">

    <!-- 로그인 -->
    <div id="login-page" class="page active">
      <div class="login-card">
        <div class="login-icon">🤖</div>
        <h2>무냐 대시보드</h2>
        <p>서버 설정을 관리하려면<br>디스코드로 로그인해주세요.</p>
        <a href="#" class="btn-discord" onclick="login()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.001.022.01.043.027.056a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
          디스코드로 로그인
        </a>
      </div>
    </div>

    <!-- 서버 선택 안내 -->
    <div id="select-page" class="page">
      <span style="font-size:2.5rem;margin-bottom:14px;display:block">👈</span>
      <h3 style="font-size:1.1rem;margin-bottom:6px;">서버를 선택해주세요</h3>
      <p style="font-size:.85rem;color:var(--sub);">왼쪽에서 설정할 서버를 골라요</p>
    </div>

    <!-- 서버 대시보드 -->
    <div id="guild-page" class="page">

      <!-- 헤더 -->
      <div class="guild-header">
        <div class="guild-avatar" id="guild-icon-wrap">
          <img id="guild-icon" src="" alt="" style="display:none">
          <span id="guild-icon-text"></span>
        </div>
        <div class="guild-info">
          <h2 id="guild-name"></h2>
          <p id="guild-member-count"></p>
        </div>
        <div class="guild-stats">
          <div class="gstat"><div class="gstat-num" id="gs-members">-</div><div class="gstat-label">멤버</div></div>
          <div class="gstat"><div class="gstat-num" id="gs-channels">-</div><div class="gstat-label">채널</div></div>
          <div class="gstat"><div class="gstat-num" id="gs-warns">-</div><div class="gstat-label">경고</div></div>
          <div class="gstat"><div class="gstat-num" id="gs-attend">-</div><div class="gstat-label">출석자</div></div>
        </div>
      </div>

      <!-- 탭 -->
      <div class="tabs" id="tab-bar">
        <button class="tab active" onclick="switchTab('tab-security',this)">🛡️ 보안</button>
        <button class="tab" onclick="switchTab('tab-channels',this)">📢 채널</button>
        <button class="tab" onclick="switchTab('tab-ticket',this)">🎫 티켓</button>
        <button class="tab" onclick="switchTab('tab-warns',this)">⚠️ 경고관리</button>
        <button class="tab" onclick="switchTab('tab-attend',this)">📅 출석순위</button>
        <button class="tab" onclick="switchTab('tab-badwords',this)">🚫 금지어</button>
        <button class="tab" onclick="switchTab('tab-chat',this)">💬 채팅봇</button>
      </div>

      <!-- 탭: 보안 -->
      <div id="tab-security" class="tab-panel active">
        <div class="grid grid-auto">
          <div class="card">
            <div class="card-head"><span class="card-icon">🛡️</span>보안 기능</div>
            <div class="toggle-row"><span class="toggle-label">도배 감지</span><label class="sw"><input type="checkbox" id="sec-spam"><span class="sw-track"></span></label></div>
            <div class="toggle-row"><span class="toggle-label">초대링크 감지</span><label class="sw"><input type="checkbox" id="sec-invite"><span class="sw-track"></span></label></div>
            <div class="toggle-row"><span class="toggle-label">전체멘션 감지</span><label class="sw"><input type="checkbox" id="sec-mention"><span class="sw-track"></span></label></div>
            <div class="toggle-row"><span class="toggle-label">금지어 필터</span><label class="sw"><input type="checkbox" id="sec-badword"><span class="sw-track"></span></label></div>
          </div>
          <div class="card">
            <div class="card-head"><span class="card-icon">⚙️</span>처벌 설정</div>
            <div class="field"><label>경고 한도 (회)</label><input type="number" class="inp" id="sec-warn-limit" min="1" max="20"></div>
            <div class="field"><label>타임아웃 시간 (분)</label><input type="number" class="inp" id="sec-timeout" min="1"></div>
          </div>
        </div>
        <div class="save-bar"><button class="btn-save" id="save-btn" onclick="saveSettings()">설정 저장</button></div>
      </div>

      <!-- 탭: 채널 -->
      <div id="tab-channels" class="tab-panel">
        <div class="grid grid-auto">
          <div class="card">
            <div class="card-head"><span class="card-icon">📢</span>채널 설정</div>
            <div class="field"><label>환영 채널</label><select class="sel" id="ch-welcome"><option value="">없음</option></select></div>
            <div class="field"><label>로그 채널</label><select class="sel" id="ch-log"><option value="">없음</option></select></div>
            <div class="field"><label>전달 채널</label><select class="sel" id="ch-notify"><option value="">없음</option></select></div>
          </div>
        </div>
        <div class="save-bar"><button class="btn-save btn-save2" onclick="saveSettings()">설정 저장</button></div>
      </div>

      <!-- 탭: 티켓 -->
      <div id="tab-ticket" class="tab-panel">
        <div class="grid grid-2">
          <div class="card">
            <div class="card-head"><span class="card-icon">🎫</span>티켓 설정</div>
            <div class="field"><label>티켓 카테고리</label><select class="sel" id="ticket-category"><option value="">없음</option></select></div>
            <div class="field"><label>지원팀 역할</label><select class="sel" id="ticket-role"><option value="">없음</option></select></div>
            <div class="field"><label>티켓 로그 채널</label><select class="sel" id="ticket-log"><option value="">없음</option></select></div>
          </div>
          <div class="card">
            <div class="card-head"><span class="card-icon">📨</span>티켓 패널 전송</div>
            <div class="field"><label>전송할 채널</label><select class="sel" id="tp-channel"><option value="">채널 선택</option></select></div>
            <div class="field"><label>패널 제목</label><input type="text" class="inp" id="tp-title" value="티켓 문의"></div>
            <div class="field"><label>패널 내용</label><input type="text" class="inp" id="tp-description" value="아래 버튼을 눌러 티켓을 열어주세요."></div>
            <div class="field"><label>버튼 이름</label><input type="text" class="inp" id="tp-button" value="티켓 열기"></div>
            <button class="btn btn-primary btn-full" onclick="sendTicketPanel()">패널 전송하기</button>
          </div>
        </div>
        <div class="save-bar"><button class="btn-save btn-save3" onclick="saveSettings()">설정 저장</button></div>
      </div>

      <!-- 탭: 경고관리 -->
      <div id="tab-warns" class="tab-panel">
        <div class="grid grid-2">
          <div class="card" style="grid-column:1/-1">
            <div class="card-head"><span class="card-icon">⚠️</span>경고 현황</div>
            <div id="warn-list" style="min-height:48px;"></div>
          </div>
          <div class="card">
            <div class="card-head"><span class="card-icon">🗑️</span>경고 초기화</div>
            <div class="field"><label>유저 ID</label><input type="text" class="inp" id="warn-uid-input" placeholder="유저 ID 입력"></div>
            <button class="btn btn-danger btn-full" onclick="clearWarn()">경고 초기화</button>
          </div>
        </div>
      </div>

      <!-- 탭: 출석순위 -->
      <div id="tab-attend" class="tab-panel">
        <div class="card">
          <div class="card-head"><span class="card-icon">📅</span>출석 순위 TOP 10</div>
          <div id="attend-list" style="min-height:60px;"></div>
        </div>
      </div>

      <!-- 탭: 금지어 -->
      <div id="tab-badwords" class="tab-panel">
        <div class="card">
          <div class="card-head"><span class="card-icon">🚫</span>금지어 목록</div>
          <div class="tag-wrap" id="badwords-list"></div>
          <div class="row">
            <input type="text" class="inp" id="badword-input" placeholder="금지어 입력" onkeypress="if(event.key==='Enter')addBadword()">
            <button class="btn btn-primary" onclick="addBadword()">추가</button>
          </div>
        </div>
        <div class="save-bar"><button class="btn-save btn-save4" onclick="saveSettings()">설정 저장</button></div>
      </div>

      <!-- 탭: 채팅봇 -->
      <div id="tab-chat" class="tab-panel">
        <div class="card">
          <div class="card-head"><span class="card-icon">💬</span>무냐야 응답</div>
          <div class="toggle-row">
            <span class="toggle-label">무냐야 응답 활성화</span>
            <label class="sw"><input type="checkbox" id="chat-enabled"><span class="sw-track"></span></label>
          </div>
        </div>
        <div class="save-bar"><button class="btn-save btn-save5" onclick="saveSettings()">설정 저장</button></div>
      </div>

    </div><!-- /guild-page -->
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
const API = window.location.hostname === 'localhost'
  ? 'http://localhost:8080'
  : 'https://discord-bot-production-463c.up.railway.app';

let currentGuildId = null;
let currentGuildData = null;

function switchTab(panelId, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.getElementById(panelId).classList.add('active');
  btn.classList.add('active');
}

async function init() {
  const params = new URLSearchParams(location.search);
  if (params.get('error')) {
    showToast('로그인 실패: ' + params.get('error'), 'error');
    history.replaceState({}, '', location.pathname);
  }
  try {
    const res = await fetch(`${API}/api/me`, { credentials: 'include' });
    if (!res.ok) throw new Error();
    const data = await res.json();
    if (data.error) throw new Error();
    showDashboard(data);
  } catch {
    showPage('login-page');
  } finally {
    document.getElementById('loading').style.display = 'none';
  }
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => { p.style.display = 'none'; p.classList.remove('active'); });
  const el = document.getElementById(id);
  el.style.display = id === 'login-page' ? 'flex' : 'block';
  el.classList.add('active');
}

function showDashboard(data) {
  const user = data.user;
  const av = user.avatar
    ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`
    : `https://cdn.discordapp.com/embed/avatars/0.png`;
  document.getElementById('nav-avatar').src = av;
  document.getElementById('nav-name').textContent = user.username;
  document.getElementById('nav-user').style.display = 'flex';
  document.getElementById('sidebar').style.display = 'block';
  document.getElementById('main-content').classList.add('shifted');

  const list = document.getElementById('server-list');
  list.innerHTML = '';
  if (!data.guilds.length) {
    list.innerHTML = `<p style="color:var(--muted);font-size:.82rem;padding:8px">봇이 있는 서버가 없어요</p>`;
  }
  data.guilds.forEach(g => {
    const el = document.createElement('div');
    el.className = 'server-item';
    el.dataset.id = g.id;
    const ic = g.icon
      ? `<div class="srv-icon"><img src="https://cdn.discordapp.com/icons/${g.id}/${g.icon}.png" onerror="this.parentElement.textContent='${g.name[0]}'"></div>`
      : `<div class="srv-icon">${g.name[0]}</div>`;
    el.innerHTML = `${ic}<span class="srv-name">${g.name}</span>`;
    el.onclick = () => selectGuild(g.id, el);
    list.appendChild(el);
  });
  showPage('select-page');
}

async function selectGuild(guildId, el) {
  document.querySelectorAll('.server-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  currentGuildId = guildId;
  try {
    const res = await fetch(`${API}/api/guild/${guildId}`, { credentials: 'include' });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    currentGuildData = data;
    renderGuild(data);
    showPage('guild-page');
  } catch(e) {
    showToast('서버 정보 로드 실패: ' + e.message, 'error');
  }
}

function renderGuild(data) {
  // 헤더
  document.getElementById('guild-name').textContent = data.name;
  document.getElementById('guild-member-count').textContent = `멤버 ${data.member_count}명`;
  const imgEl = document.getElementById('guild-icon');
  const txtEl = document.getElementById('guild-icon-text');
  if (data.icon) { imgEl.src = data.icon; imgEl.style.display = 'block'; txtEl.style.display = 'none'; }
  else { imgEl.style.display = 'none'; txtEl.style.display = 'block'; txtEl.textContent = data.name[0]; }

  // 헤더 통계
  document.getElementById('gs-members').textContent = data.member_count;
  const warnTotal = Object.values(data.warns || {}).filter(v => v > 0).length;
  const attendTotal = Object.keys(data.attendance || {}).length;
  document.getElementById('gs-warns').textContent = warnTotal;
  document.getElementById('gs-attend').textContent = attendTotal;
  const chCount = (data.text_channels || []).length;
  document.getElementById('gs-channels').textContent = chCount;

  // 보안
  document.getElementById('sec-spam').checked = data.security.spam;
  document.getElementById('sec-invite').checked = data.security.invite;
  document.getElementById('sec-mention').checked = data.security.mention;
  document.getElementById('sec-badword').checked = data.security.badword;
  document.getElementById('sec-warn-limit').value = data.security.warn_limit;
  document.getElementById('sec-timeout').value = data.security.timeout_minutes;

  // 채팅
  document.getElementById('chat-enabled').checked = data.chat_enabled;

  // 채널 옵션
  const chOpts = `<option value="">없음</option>` + data.text_channels.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
  const tpOpts = `<option value="">채널 선택</option>` + data.text_channels.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
  ['ch-welcome','ch-log','ch-notify','ticket-log'].forEach(id => document.getElementById(id).innerHTML = chOpts);
  document.getElementById('tp-channel').innerHTML = tpOpts;
  document.getElementById('ch-welcome').value = data.channels.welcome || '';
  document.getElementById('ch-log').value = data.channels.log || '';
  document.getElementById('ch-notify').value = data.channels.notify || '';
  document.getElementById('ticket-log').value = data.ticket.log_channel_id || '';

  // 카테고리
  const catOpts = `<option value="">없음</option>` + data.categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
  document.getElementById('ticket-category').innerHTML = catOpts;
  document.getElementById('ticket-category').value = data.ticket.category_id || '';

  // 역할
  const roleOpts = `<option value="">없음</option>` + data.roles.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
  document.getElementById('ticket-role').innerHTML = roleOpts;
  document.getElementById('ticket-role').value = data.ticket.support_role_id || '';

  renderBadwords(data.security.badwords || []);
  renderWarns(data.warns || {});
  renderAttendance(data.attendance || {});
}

function renderBadwords(words) {
  const list = document.getElementById('badwords-list');
  list.innerHTML = words.length
    ? words.map((w,i) => `<div class="tag">${w}<button onclick="removeBadword(${i})">×</button></div>`).join('')
    : `<span style="color:var(--muted);font-size:.82rem">등록된 금지어 없음</span>`;
}
function addBadword() {
  const inp = document.getElementById('badword-input');
  const w = inp.value.trim(); if (!w) return;
  if (!currentGuildData.security.badwords.includes(w)) {
    currentGuildData.security.badwords.push(w);
    renderBadwords(currentGuildData.security.badwords);
  }
  inp.value = '';
}
function removeBadword(i) {
  currentGuildData.security.badwords.splice(i,1);
  renderBadwords(currentGuildData.security.badwords);
}

function renderWarns(warns) {
  const el = document.getElementById('warn-list');
  const entries = Object.entries(warns).filter(([,v]) => v > 0).sort((a,b) => b[1]-a[1]);
  if (!entries.length) { el.innerHTML = '<p style="color:var(--muted);font-size:.85rem;padding:4px 0">경고받은 멤버가 없어요!</p>'; return; }
  el.innerHTML = entries.slice(0,15).map(([uid,cnt]) =>
    `<div class="list-item"><span class="list-item-left" style="font-family:monospace;font-size:.8rem">${uid}</span><span class="list-item-right" style="color:var(--red)">${cnt}회 경고</span></div>`
  ).join('');
}
async function clearWarn() {
  const uid = document.getElementById('warn-uid-input').value.trim();
  if (!uid) { showToast('유저 ID를 입력해주세요!', 'error'); return; }
  try {
    const res = await fetch(`${API}/api/guild/${currentGuildId}/warn/${uid}/clear`, { method:'POST', credentials:'include' });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    showToast('경고 초기화 완료!', 'success');
    document.getElementById('warn-uid-input').value = '';
    if (currentGuildData?.warns) { delete currentGuildData.warns[uid]; renderWarns(currentGuildData.warns); }
  } catch(e) { showToast('초기화 실패: '+e.message, 'error'); }
}

function renderAttendance(att) {
  const el = document.getElementById('attend-list');
  const entries = Object.entries(att).sort((a,b)=>b[1].count-a[1].count).slice(0,10);
  if (!entries.length) { el.innerHTML = '<p style="color:var(--muted);font-size:.85rem;padding:4px 0">출석한 멤버가 없어요!</p>'; return; }
  const medals = ['🥇','🥈','🥉'];
  el.innerHTML = entries.map(([uid,d],i) =>
    `<div class="list-item">
      <span class="list-item-left">${medals[i]||((i+1)+'위')} <span style="font-family:monospace;font-size:.78rem">${uid}</span></span>
      <span class="list-item-right" style="color:var(--accent2)"><b>${d.count}일</b> <span style="color:var(--muted);font-weight:400">(연속 ${d.streak}일)</span></span>
    </div>`
  ).join('');
}

async function saveSettings() {
  const allBtns = document.querySelectorAll('.btn-save');
  allBtns.forEach(b => { b.disabled = true; b.textContent = '저장 중...'; });
  try {
    const payload = {
      security: {
        spam: document.getElementById('sec-spam').checked,
        invite: document.getElementById('sec-invite').checked,
        mention: document.getElementById('sec-mention').checked,
        badword: document.getElementById('sec-badword').checked,
        warn_limit: parseInt(document.getElementById('sec-warn-limit').value),
        timeout_minutes: parseInt(document.getElementById('sec-timeout').value),
        badwords: currentGuildData.security.badwords,
      },
      ticket: {
        category_id: document.getElementById('ticket-category').value,
        support_role_id: document.getElementById('ticket-role').value,
        log_channel_id: document.getElementById('ticket-log').value,
      },
      channels: {
        welcome: document.getElementById('ch-welcome').value,
        log: document.getElementById('ch-log').value,
        notify: document.getElementById('ch-notify').value,
      },
      chat_enabled: document.getElementById('chat-enabled').checked,
    };
    const res = await fetch(`${API}/api/guild/${currentGuildId}`, {
      method:'POST', credentials:'include',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (data.success) {
      allBtns.forEach(b => { b.textContent = '저장됨 ✓'; b.classList.add('saved'); });
      showToast('설정이 저장됐어요!', 'success');
      setTimeout(() => allBtns.forEach(b => { b.textContent = '설정 저장'; b.classList.remove('saved'); b.disabled = false; }), 2000);
    } else throw new Error(data.error || '저장 실패');
  } catch(e) {
    showToast('저장 실패: '+e.message, 'error');
    allBtns.forEach(b => { b.textContent = '설정 저장'; b.disabled = false; });
  }
}

async function sendTicketPanel() {
  const channel_id = document.getElementById('tp-channel').value;
  if (!channel_id) { showToast('채널을 선택해주세요!', 'error'); return; }
  try {
    const res = await fetch(`${API}/api/guild/${currentGuildId}/ticket-panel`, {
      method:'POST', credentials:'include',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        channel_id,
        title: document.getElementById('tp-title').value || '티켓 문의',
        description: document.getElementById('tp-description').value || '아래 버튼을 눌러 티켓을 열어주세요.',
        button_label: document.getElementById('tp-button').value || '티켓 열기',
      }),
    });
    const data = await res.json();
    if (data.success) showToast('티켓 패널 전송 완료!', 'success');
    else showToast('실패: '+data.error, 'error');
  } catch(e) { showToast('오류: '+e.message, 'error'); }
}

function login() { window.location.href = `${API}/auth/login`; }
async function logout() { await fetch(`${API}/api/logout`,{method:'POST',credentials:'include'}); location.reload(); }
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

init();
</script>
</body>
</html>
