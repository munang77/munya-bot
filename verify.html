<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>무냐 — 보안 확인</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
  font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;
  background:#06060e;color:#f0efff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;overflow:hidden;
}

/* 배경 그라디언트 */
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 600px 400px at 50% 40%,rgba(124,109,240,.07) 0%,transparent 70%);
  pointer-events:none;
}

/* 상단 바 */
.topbar{
  position:fixed;top:0;left:0;right:0;
  height:52px;display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;
  background:rgba(6,6,14,.9);backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(255,255,255,.06);
  font-size:.82rem;color:#4a4970;
}
.topbar-logo{display:flex;align-items:center;gap:8px;font-weight:800;color:#f0efff;font-size:.9rem;}
.topbar-dot{width:6px;height:6px;border-radius:50%;background:#34d399;box-shadow:0 0 6px #34d399;}

/* 메인 카드 */
.card{
  width:100%;max-width:460px;
  background:#111120;border:1px solid rgba(255,255,255,.08);
  border-radius:20px;padding:44px 40px;
  text-align:center;position:relative;
}

/* 아이콘 */
.shield-wrap{
  width:68px;height:68px;border-radius:18px;
  background:rgba(124,109,240,.1);border:1px solid rgba(124,109,240,.2);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 22px;
  animation:float 3s ease-in-out infinite;
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.shield-icon{font-size:2rem;}

.card h1{font-size:1.25rem;font-weight:800;margin-bottom:8px;letter-spacing:-.3px;}
.card p{font-size:.85rem;color:#6b6a8a;line-height:1.7;margin-bottom:28px;}

/* 체크박스 */
.checkbox-wrap{
  display:flex;align-items:center;gap:14px;
  background:#0c0c18;border:1px solid rgba(255,255,255,.08);
  border-radius:12px;padding:16px 20px;
  cursor:pointer;user-select:none;
  transition:all .2s;margin-bottom:20px;
  position:relative;overflow:hidden;
}
.checkbox-wrap:hover{border-color:rgba(124,109,240,.3);background:#0f0f1e;}
.checkbox-wrap.verified{border-color:rgba(52,211,153,.3);background:rgba(52,211,153,.05);}

.cb-box{
  width:22px;height:22px;border-radius:6px;flex-shrink:0;
  border:2px solid rgba(255,255,255,.15);
  background:transparent;
  display:flex;align-items:center;justify-content:center;
  transition:all .3s;
}
.checkbox-wrap.verified .cb-box{
  background:#34d399;border-color:#34d399;
}
.cb-check{
  font-size:.8rem;font-weight:900;color:#fff;
  opacity:0;transform:scale(.5);transition:all .25s;
}
.checkbox-wrap.verified .cb-check{opacity:1;transform:scale(1);}

.cb-text{font-size:.9rem;font-weight:600;color:#9998b8;text-align:left;}
.checkbox-wrap.verified .cb-text{color:#f0efff;}

/* 스피너 */
.cb-spinner{
  position:absolute;right:20px;
  width:18px;height:18px;
  border:2px solid rgba(255,255,255,.1);
  border-top-color:#7c6df0;
  border-radius:50%;
  animation:spin .7s linear infinite;
  display:none;
}
.checkbox-wrap.checking .cb-spinner{display:block;}
@keyframes spin{to{transform:rotate(360deg)}}

/* 진행바 */
.progress-bar{
  height:2px;background:rgba(255,255,255,.05);
  border-radius:100px;overflow:hidden;margin-bottom:20px;
  opacity:0;transition:opacity .3s;
}
.progress-bar.active{opacity:1;}
.progress-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,#7c6df0,#a78bfa);
  border-radius:100px;transition:width .05s linear;
}

/* 상태 메시지 */
.status{
  font-size:.78rem;color:#4a4970;
  min-height:20px;transition:all .3s;
  margin-bottom:16px;
}
.status.checking{color:#7c6df0;}
.status.done{color:#34d399;}
.status.fail{color:#f87171;}

/* 정보 */
.info-row{
  display:flex;justify-content:space-between;
  padding-top:16px;border-top:1px solid rgba(255,255,255,.05);
  font-size:.72rem;color:#2e2e50;
}

/* 성공 오버레이 */
.success-overlay{
  position:fixed;inset:0;
  background:rgba(6,6,14,.95);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .4s;z-index:100;
}
.success-overlay.show{opacity:1;pointer-events:all;}
.success-icon{font-size:3rem;margin-bottom:16px;animation:pop .4s ease-out;}
@keyframes pop{0%{transform:scale(.5)}70%{transform:scale(1.1)}100%{transform:scale(1)}}
.success-overlay h2{font-size:1.2rem;font-weight:800;margin-bottom:6px;}
.success-overlay p{font-size:.85rem;color:#6b6a8a;}
.redirect-bar{
  width:200px;height:3px;background:rgba(255,255,255,.06);
  border-radius:100px;overflow:hidden;margin-top:20px;
}
.redirect-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,#7c6df0,#a78bfa);
  animation:redirect 1.5s ease-in-out forwards;
  animation-delay:.3s;
}
@keyframes redirect{to{width:100%}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo"><span class="topbar-dot"></span> 무냐</div>
  <span>보안 확인</span>
</div>

<div class="card">
  <div class="shield-wrap"><div class="shield-icon">🛡️</div></div>
  <h1>사람인지 확인해요</h1>
  <p>무냐 웹사이트에 접근하기 전에<br>간단한 보안 확인이 필요해요.</p>

  <div class="checkbox-wrap" id="cb-wrap" onclick="startVerify()">
    <div class="cb-box">
      <span class="cb-check">✓</span>
    </div>
    <span class="cb-text" id="cb-text">나는 봇이 아니에요</span>
    <div class="cb-spinner"></div>
  </div>

  <div class="progress-bar" id="progress-bar">
    <div class="progress-fill" id="progress-fill"></div>
  </div>

  <div class="status" id="status">클릭하여 확인을 시작하세요</div>

  <div class="info-row">
    <span>munang77.github.io/munya-bot</span>
    <span>보안 확인 by 무냐</span>
  </div>
</div>

<div class="success-overlay" id="success-overlay">
  <div class="success-icon">✅</div>
  <h2>확인 완료!</h2>
  <p>잠시 후 페이지로 이동해요...</p>
  <div class="redirect-bar"><div class="redirect-fill"></div></div>
</div>

<script>
// 봇 감지용 변수들
let mouseMoved = false;
let touchUsed = false;
let verified = false;
let verifyInProgress = false;

// 마우스/터치 이동 감지
document.addEventListener('mousemove', () => { mouseMoved = true; }, { once: true });
document.addEventListener('touchstart', () => { touchUsed = true; }, { once: true });

// 페이지 로드 타임스탬프
const pageLoadTime = Date.now();

function startVerify() {
  if (verifyInProgress || verified) return;

  // 봇 판별: 마우스 이동 없고 터치도 없으면 의심
  const elapsed = Date.now() - pageLoadTime;
  const isHuman = mouseMoved || touchUsed || elapsed > 300;

  if (!isHuman) {
    // 봇으로 의심 → 실패 처리
    document.getElementById('status').textContent = '확인 실패. 다시 시도해주세요.';
    document.getElementById('status').className = 'status fail';
    return;
  }

  verifyInProgress = true;
  const wrap = document.getElementById('cb-wrap');
  const bar = document.getElementById('progress-bar');
  const fill = document.getElementById('progress-fill');
  const status = document.getElementById('status');
  const cbText = document.getElementById('cb-text');

  wrap.classList.add('checking');
  bar.classList.add('active');
  status.textContent = '브라우저 환경 확인 중...';
  status.className = 'status checking';
  cbText.textContent = '확인 중...';

  // 진행바 애니메이션
  let progress = 0;
  const msgs = [
    [20, 'JavaScript 환경 확인 중...'],
    [45, '브라우저 신뢰도 검사 중...'],
    [70, '보안 토큰 생성 중...'],
    [90, '거의 다 됐어요...'],
    [100, '완료!'],
  ];
  let msgIdx = 0;

  const timer = setInterval(() => {
    progress += Math.random() * 8 + 2;
    if (progress > 100) progress = 100;
    fill.style.width = progress + '%';

    if (msgIdx < msgs.length && progress >= msgs[msgIdx][0]) {
      status.textContent = msgs[msgIdx][1];
      msgIdx++;
    }

    if (progress >= 100) {
      clearInterval(timer);
      setTimeout(completeVerify, 300);
    }
  }, 60);
}

function completeVerify() {
  verified = true;
  verifyInProgress = false;

  const wrap = document.getElementById('cb-wrap');
  const status = document.getElementById('status');

  wrap.classList.remove('checking');
  wrap.classList.add('verified');
  status.textContent = '✓ 확인 완료';
  status.className = 'status done';

  // 토큰 저장
  sessionStorage.setItem('munya_pass', btoa(Date.now().toString()));

  // 성공 오버레이
  setTimeout(() => {
    document.getElementById('success-overlay').classList.add('show');
    // 1.8초 후 메인 페이지로
    setTimeout(() => {
      window.location.href = 'index.html';
    }, 1800);
  }, 400);
}

// 이미 인증한 경우 바로 통과
if (sessionStorage.getItem('munya_pass')) {
  window.location.replace('index.html');
}
</script>
</body>
</html>
